name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Replace 'derreckmore-dev/TaxPulse-AI' with your exact Hugging Face Space username and Space name if different
          git push --force https://derreckmore-dev:$HF_TOKEN@huggingface.co/spaces/derreckmore-dev/TaxPulse-AI main
